<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    @keyframes sb_flick{0%,100%{opacity:1}42%{opacity:1}43%{opacity:.74}44%{opacity:1}45%{opacity:.9}46%{opacity:1}70%{opacity:1}71%{opacity:.85}72%{opacity:1}}
    .sb_neon{animation:sb_flick 5.4s infinite ease-in-out;animation-delay:-1.6s;will-change:opacity}
    @media(prefers-reduced-motion:reduce){.sb_neon{animation:none}}
  </style>
  <defs>
    <filter id="sb_wide" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6.2"/></filter>
    <filter id="sb_soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.3"/></filter>

    <!-- strawberry body: rounded shoulders + central dip, tapering to a soft point -->
    <path id="sb_body" fill="none" d="M100,80
      C90,69 76,66 64,70
      C50,75 47,92 48,104
      C49,124 72,150 100,166
      C128,150 151,124 152,104
      C153,92 150,75 136,70
      C124,66 110,69 100,80 Z"/>

    <!-- calyx: a single leaf, repeated by rotation -->
    <path id="sb_leaf" fill="none" d="M100,80 Q92,58 100,36 Q108,58 100,80 Z"/>
    <g id="sb_calyx" fill="none">
      <use href="#sb_leaf"/>
      <use href="#sb_leaf" transform="rotate(34 100 80)"/>
      <use href="#sb_leaf" transform="rotate(-34 100 80)"/>
      <use href="#sb_leaf" transform="rotate(66 100 80)"/>
      <use href="#sb_leaf" transform="rotate(-66 100 80)"/>
    </g>
    <path id="sb_stem" fill="none" d="M100,42 C101,35 99,31 100,26"/>

    <!-- seed + highlight -->
    <ellipse id="sb_seed" cx="0" cy="0" rx="2" ry="3.3"/>
    <ellipse id="sb_seedh" cx="-0.7" cy="-1.1" rx="0.7" ry="1.2"/>
    <g id="sb_seeds">
      <use href="#sb_seed" transform="translate(82,94) rotate(-36.9)"/>
      <use href="#sb_seed" transform="translate(100,94) rotate(0.0)"/>
      <use href="#sb_seed" transform="translate(118,94) rotate(36.9)"/>
      <use href="#sb_seed" transform="translate(72,108) rotate(-36.4)"/>
      <use href="#sb_seed" transform="translate(90,108) rotate(-14.7)"/>
      <use href="#sb_seed" transform="translate(110,108) rotate(14.7)"/>
      <use href="#sb_seed" transform="translate(128,108) rotate(36.4)"/>
      <use href="#sb_seed" transform="translate(80,122) rotate(-21.0)"/>
      <use href="#sb_seed" transform="translate(100,122) rotate(0.0)"/>
      <use href="#sb_seed" transform="translate(120,122) rotate(21.0)"/>
      <use href="#sb_seed" transform="translate(90,136) rotate(-8.6)"/>
      <use href="#sb_seed" transform="translate(110,136) rotate(8.6)"/>
      <use href="#sb_seed" transform="translate(100,149) rotate(0.0)"/>
    </g>
    <g id="sb_seedhi">
      <use href="#sb_seedh" transform="translate(82,94) rotate(-36.9)"/>
      <use href="#sb_seedh" transform="translate(100,94) rotate(0.0)"/>
      <use href="#sb_seedh" transform="translate(118,94) rotate(36.9)"/>
      <use href="#sb_seedh" transform="translate(72,108) rotate(-36.4)"/>
      <use href="#sb_seedh" transform="translate(90,108) rotate(-14.7)"/>
      <use href="#sb_seedh" transform="translate(110,108) rotate(14.7)"/>
      <use href="#sb_seedh" transform="translate(128,108) rotate(36.4)"/>
      <use href="#sb_seedh" transform="translate(80,122) rotate(-21.0)"/>
      <use href="#sb_seedh" transform="translate(100,122) rotate(0.0)"/>
      <use href="#sb_seedh" transform="translate(120,122) rotate(21.0)"/>
      <use href="#sb_seedh" transform="translate(90,136) rotate(-8.6)"/>
      <use href="#sb_seedh" transform="translate(110,136) rotate(8.6)"/>
      <use href="#sb_seedh" transform="translate(100,149) rotate(0.0)"/>
    </g>
  </defs>

  <g class="sb_neon" transform="translate(100,100) rotate(30) scale(0.92) translate(-100,-97)">

    <!-- WIDE GLOW -->
    <g filter="url(#sb_wide)">
      <use href="#sb_body"  stroke="#ff2e63" stroke-width="16" opacity="0.27" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sb_calyx" stroke="#23ff86" stroke-width="13" opacity="0.27" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sb_stem"  stroke="#23ff86" stroke-width="13" opacity="0.27" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sb_seeds" fill="#ffd86b" opacity="0.2"/>
    </g>
    <!-- SOFT GLOW -->
    <g filter="url(#sb_soft)">
      <use href="#sb_body"  stroke="#ff3b6b" stroke-width="8.5" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sb_calyx" stroke="#39ff8b" stroke-width="7"   opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sb_stem"  stroke="#39ff8b" stroke-width="7"   opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#sb_seeds" fill="#ffd86b" opacity="0.5"/>
    </g>

    <!-- CORES -->
    <use href="#sb_body"  stroke="#ff4d77" stroke-width="6"   stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#sb_calyx" stroke="#5bff9f" stroke-width="5"   stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#sb_stem"  stroke="#5bff9f" stroke-width="5"   stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#sb_seeds" fill="#ffe08a"/>
    <use href="#sb_seedhi" fill="#ffffff" opacity="0.9"/>

    <!-- HOT INNER LINES -->
    <use href="#sb_body"  stroke="#ffe2ea" stroke-width="1.7" opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#sb_calyx" stroke="#effff5" stroke-width="1.6" opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#sb_stem"  stroke="#effff5" stroke-width="1.6" opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>