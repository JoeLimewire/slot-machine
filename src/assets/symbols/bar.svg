<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    @keyframes br_flick{
      0%,100%{opacity:1}
      42%{opacity:1}43%{opacity:.74}44%{opacity:1}
      45%{opacity:.9}46%{opacity:1}
      70%{opacity:1}71%{opacity:.84}72%{opacity:1}
    }
    .br_neon{animation:br_flick 6s infinite ease-in-out;animation-delay:-3.35s;will-change:opacity}
    @media(prefers-reduced-motion:reduce){.br_neon{animation:none}}
  </style>
  <defs>
    <filter id="br_wide" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6.5"/>
    </filter>
    <filter id="br_soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>

    <path id="br_border" fill="none"
      d="M46,66 H154 A18,18 0 0 1 172,84 V108 A18,18 0 0 1 154,126 H46 A18,18 0 0 1 28,108 V84 A18,18 0 0 1 46,66 Z"/>

    <g id="br_letters" fill="none">
      <!-- B -->
      <path d="M52,78 L52,114"/>
      <path d="M52,78 C81,78 81,96 52,96"/>
      <path d="M52,96 C83,96 83,114 52,114"/>
      <!-- A -->
      <path d="M86.5,114 L99.5,78 L112.5,114"/>
      <path d="M91.6,100 L107.4,100"/>
      <!-- R -->
      <path d="M124.5,78 L124.5,114"/>
      <path d="M124.5,78 C147,78 147,96 124.5,96"/>
      <path d="M124.5,96 L148.5,114"/>
    </g>
  </defs>

  <g class="br_neon">
    <!-- WIDE GLOW -->
    <g filter="url(#br_wide)">
      <use href="#br_border"  stroke="#1f7bff" stroke-width="16"   opacity="0.28" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#br_letters" stroke="#ff2e63" stroke-width="12"   opacity="0.28" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- SOFT GLOW -->
    <g filter="url(#br_soft)">
      <use href="#br_border"  stroke="#2f9bff" stroke-width="9"    opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#br_letters" stroke="#ff3b6b" stroke-width="6.5"  opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- CORES -->
    <use href="#br_border"  stroke="#3aa5ff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#br_letters" stroke="#ff4d77" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- HOT INNER LINES -->
    <use href="#br_border"  stroke="#e8f3ff" stroke-width="2"   opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#br_letters" stroke="#ffe2ea" stroke-width="1.5" opacity="0.92" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>