<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    @keyframes wm_flick{
      0%,100%{opacity:1}
      40%{opacity:1}41%{opacity:.73}42%{opacity:1}
      43%{opacity:.9}44%{opacity:1}
      71%{opacity:1}72%{opacity:.83}73%{opacity:1}
    }
    .wm_neon{animation:wm_flick 5.3s infinite ease-in-out;animation-delay:-2.1s;will-change:opacity}
    @media(prefers-reduced-motion:reduce){.wm_neon{animation:none}}
  </style>
  <defs>
    <filter id="wm_wide" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="wm_soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.3"/>
    </filter>

    <!-- slice geometry: flat top (diameter), curved bottom -->
    <path id="wm_rind"    d="M22,74 A78,78 0 0 0 178,74" fill="none"/>
    <path id="wm_pith"    d="M30,74 A70,70 0 0 0 170,74" fill="none"/>
    <path id="wm_flesharc" d="M37,74 A63,63 0 0 0 163,74" fill="none"/>
    <path id="wm_top"     d="M37,74 L163,74" fill="none"/>
    <path id="wm_fleshfill" d="M37,74 A63,63 0 0 0 163,74 Z"/>
    <path id="wm_rindfill"  d="M22,74 A78,78 0 0 0 178,74 L163,74 A63,63 0 0 1 37,74 Z"/>

    <!-- a single seed teardrop, point up, centred at origin -->
    <path id="wm_seed" d="M0,-6.2 Q4,-1.2 3.1,1.8 Q2.6,6 0,6 Q-2.6,6 -3.1,1.8 Q-4,-1.2 0,-6.2 Z"/>
    <ellipse id="wm_seedh" cx="-1.2" cy="-2.2" rx="1" ry="1.6"/>

    <g id="wm_seeds">
      <use href="#wm_seed" transform="translate(100,99)"/>
      <use href="#wm_seed" transform="translate(81,95) rotate(-20)"/>
      <use href="#wm_seed" transform="translate(119,95) rotate(20)"/>
      <use href="#wm_seed" transform="translate(91,117) rotate(-12)"/>
      <use href="#wm_seed" transform="translate(109,117) rotate(12)"/>
    </g>
    <g id="wm_seedhi">
      <use href="#wm_seedh" transform="translate(100,99)"/>
      <use href="#wm_seedh" transform="translate(81,95) rotate(-20)"/>
      <use href="#wm_seedh" transform="translate(119,95) rotate(20)"/>
      <use href="#wm_seedh" transform="translate(91,117) rotate(-12)"/>
      <use href="#wm_seedh" transform="translate(109,117) rotate(12)"/>
    </g>
  </defs>

  <g class="wm_neon" transform="translate(100,100) rotate(30) scale(0.9) translate(-100,-113)">

    <!-- soft body fills -->
    <use href="#wm_rindfill"  fill="#28ff86" opacity="0.13"/>
    <use href="#wm_fleshfill" fill="#ff3b6b" opacity="0.16"/>

    <!-- WIDE GLOW -->
    <g filter="url(#wm_wide)">
      <use href="#wm_rind"     stroke="#18ff7a" stroke-width="16" opacity="0.28" stroke-linecap="round"/>
      <use href="#wm_flesharc" stroke="#ff2e63" stroke-width="14" opacity="0.28" stroke-linecap="round"/>
      <use href="#wm_top"      stroke="#ff2e63" stroke-width="14" opacity="0.28" stroke-linecap="round"/>
    </g>
    <!-- SOFT GLOW -->
    <g filter="url(#wm_soft)">
      <use href="#wm_rind"     stroke="#39ff8b" stroke-width="8.5" opacity="0.55" stroke-linecap="round"/>
      <use href="#wm_flesharc" stroke="#ff3b6b" stroke-width="7.5" opacity="0.55" stroke-linecap="round"/>
      <use href="#wm_top"      stroke="#ff3b6b" stroke-width="7.5" opacity="0.55" stroke-linecap="round"/>
      <use href="#wm_pith"     stroke="#bdffd6" stroke-width="3"   opacity="0.5"  stroke-linecap="round"/>
    </g>

    <!-- CORES -->
    <use href="#wm_rind"     stroke="#39ff8b" stroke-width="5"   stroke-linecap="round"/>
    <use href="#wm_flesharc" stroke="#ff4d77" stroke-width="4.5" stroke-linecap="round"/>
    <use href="#wm_top"      stroke="#ff4d77" stroke-width="4.5" stroke-linecap="round"/>
    <use href="#wm_pith"     stroke="#eafff2" stroke-width="1.8" opacity="0.85" stroke-linecap="round"/>

    <!-- HOT INNER LINES -->
    <use href="#wm_rind"     stroke="#eafff2" stroke-width="1.6" opacity="0.95" stroke-linecap="round"/>
    <use href="#wm_flesharc" stroke="#ffe2ea" stroke-width="1.5" opacity="0.95" stroke-linecap="round"/>
    <use href="#wm_top"      stroke="#ffe2ea" stroke-width="1.5" opacity="0.95" stroke-linecap="round"/>

    <!-- SEEDS: glow, dark body w/ neon rim, highlight -->
    <use href="#wm_seeds" fill="#ff5b8a" opacity="0.45" filter="url(#wm_soft)"/>
    <use href="#wm_seeds" fill="#2a0812" stroke="#ff6f99" stroke-width="1.2"/>
    <use href="#wm_seedhi" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>