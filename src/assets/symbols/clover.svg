<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Four-leaf clover in neon green"><style>@keyframes cl_flick{0%,100%{opacity:1}43%{opacity:1}44%{opacity:.74}45%{opacity:1}46%{opacity:.9}47%{opacity:1}70%{opacity:1}71%{opacity:.85}72%{opacity:1}}.cl_neon{animation:cl_flick 6.75s infinite ease-in-out;animation-delay:-0.12s;will-change:opacity}@media(prefers-reduced-motion:reduce){.cl_neon{animation:none}}</style><defs><filter id="cl_gw" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="6.5"/></filter><filter id="cl_gs" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.4"/></filter><path id="cl_leaf" d="M0,0 C-8,-12 -26,-18 -28,-34 C-29,-49 -15,-57 0,-43 C15,-57 29,-49 28,-34 C26,-18 8,-12 0,0 Z"/><path id="cl_stem" d="M100,104 C112,140 116,168 109,188"/></defs><g class="cl_neon">
