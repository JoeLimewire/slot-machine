  <g filter="url(#cl_gs)"><g stroke="#39ff8b" stroke-width="9" opacity="0.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><use href="#cl_leaf" transform="translate(100,100) rotate(0)"/><use href="#cl_leaf" transform="translate(100,100) rotate(90)"/><use href="#cl_leaf" transform="translate(100,100) rotate(180)"/><use href="#cl_leaf" transform="translate(100,100) rotate(270)"/><use href="#cl_stem"/></g></g>
  <g stroke="#39ff8b" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><use href="#cl_leaf" transform="translate(100,100) rotate(0)"/><use href="#cl_leaf" transform="translate(100,100) rotate(90)"/><use href="#cl_leaf" transform="translate(100,100) rotate(180)"/><use href="#cl_leaf" transform="translate(100,100) rotate(270)"/><use href="#cl_stem"/></g>
